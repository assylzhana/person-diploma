server:
  port: 8084

spring:
  application:
    name: finance-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${FINANCE_DATASOURCE_URL}
    username: ${FINANCE_DATASOURCE_USERNAME}
    password: ${FINANCE_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      max-lifetime: 60000
      idle-timeout: 30000
      keepalive-time: 30000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    sdu.diploma: DEBUG
