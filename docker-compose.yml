version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      GOAL_SERVICE_URL: ${GOAL_SERVICE_URL}
      FINANCE_SERVICE_URL: ${FINANCE_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service
      - user-service
      - goal-service
      - finance-service
      - analytics-service
      - notification-service
    restart: on-failure

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      AUTH_DATASOURCE_URL: ${AUTH_DATASOURCE_URL}
      AUTH_DATASOURCE_USERNAME: ${AUTH_DATASOURCE_USERNAME}
      AUTH_DATASOURCE_PASSWORD: ${AUTH_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    restart: on-failure

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      USER_DATASOURCE_URL: ${USER_DATASOURCE_URL}
      USER_DATASOURCE_USERNAME: ${USER_DATASOURCE_USERNAME}
      USER_DATASOURCE_PASSWORD: ${USER_DATASOURCE_PASSWORD}
    restart: on-failure

  goal-service:
    build:
      context: ./goal-service
      dockerfile: Dockerfile
    container_name: goal-service
    ports:
      - "8083:8083"
    environment:
      GOAL_DATASOURCE_URL: ${GOAL_DATASOURCE_URL}
      GOAL_DATASOURCE_USERNAME: ${GOAL_DATASOURCE_USERNAME}
      GOAL_DATASOURCE_PASSWORD: ${GOAL_DATASOURCE_PASSWORD}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
    restart: on-failure

  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: finance-service
    ports:
      - "8084:8084"
    environment:
      FINANCE_DATASOURCE_URL: ${FINANCE_DATASOURCE_URL}
      FINANCE_DATASOURCE_USERNAME: ${FINANCE_DATASOURCE_USERNAME}
      FINANCE_DATASOURCE_PASSWORD: ${FINANCE_DATASOURCE_PASSWORD}
    restart: on-failure

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8085:8085"
    environment:
      GOAL_SERVICE_URL: ${GOAL_SERVICE_URL}
      FINANCE_SERVICE_URL: ${FINANCE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      NOTIFICATION_DATASOURCE_URL: ${NOTIFICATION_DATASOURCE_URL}
      NOTIFICATION_DATASOURCE_USERNAME: ${NOTIFICATION_DATASOURCE_USERNAME}
      NOTIFICATION_DATASOURCE_PASSWORD: ${NOTIFICATION_DATASOURCE_PASSWORD}
    restart: on-failure

volumes:
  postgres_data:
