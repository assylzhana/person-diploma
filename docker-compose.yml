version: '3.8'

networks:
  person-net:
    driver: bridge

services:

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      GOAL_SERVICE_URL: http://goal-service:8083
      FINANCE_SERVICE_URL: http://finance-service:8084
      ANALYTICS_SERVICE_URL: http://analytics-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      goal-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - person-net

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      AUTH_DATASOURCE_URL: ${AUTH_DATASOURCE_URL}
      AUTH_DATASOURCE_USERNAME: ${AUTH_DATASOURCE_USERNAME}
      AUTH_DATASOURCE_PASSWORD: ${AUTH_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      USER_SERVICE_URL: http://user-service:8082
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - person-net

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      USER_DATASOURCE_URL: ${USER_DATASOURCE_URL}
      USER_DATASOURCE_USERNAME: ${USER_DATASOURCE_USERNAME}
      USER_DATASOURCE_PASSWORD: ${USER_DATASOURCE_PASSWORD}
      GOAL_SERVICE_URL: http://goal-service:8083
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - person-net

  goal-service:
    build:
      context: ./goal-service
      dockerfile: Dockerfile
    container_name: goal-service
    ports:
      - "8083:8083"
    environment:
      GOAL_DATASOURCE_URL: ${GOAL_DATASOURCE_URL}
      GOAL_DATASOURCE_USERNAME: ${GOAL_DATASOURCE_USERNAME}
      GOAL_DATASOURCE_PASSWORD: ${GOAL_DATASOURCE_PASSWORD}
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - person-net

  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: finance-service
    ports:
      - "8084:8084"
    environment:
      FINANCE_DATASOURCE_URL: ${FINANCE_DATASOURCE_URL}
      FINANCE_DATASOURCE_USERNAME: ${FINANCE_DATASOURCE_USERNAME}
      FINANCE_DATASOURCE_PASSWORD: ${FINANCE_DATASOURCE_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - person-net

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8085:8085"
    environment:
      GOAL_SERVICE_URL: http://goal-service:8083
      FINANCE_SERVICE_URL: http://finance-service:8084
      USER_SERVICE_URL: http://user-service:8082
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - person-net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      NOTIFICATION_DATASOURCE_URL: ${NOTIFICATION_DATASOURCE_URL}
      NOTIFICATION_DATASOURCE_USERNAME: ${NOTIFICATION_DATASOURCE_USERNAME}
      NOTIFICATION_DATASOURCE_PASSWORD: ${NOTIFICATION_DATASOURCE_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - person-net
